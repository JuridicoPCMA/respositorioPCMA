12123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012123456789012345678901234567890121234 123456789012345678901234567890121234567890123456789012345678901212345678901234567890123456789012"},{"titulo":"Decreto n 28.862/2013 - Diarias","tipo":"Decreto","tema":"Administracao","ano":2013,"arquivo":"DECRETO Nº 28.862 DE 2013 – Diárias – PAG 21.pdf","texto":""},{"titulo":"Decreto n 31.401/2015 - Locais Insalubres","tipo":"Decreto","tema":"Gestao de Pessoal","ano":2015,"arquivo":"DECRETO Nº 31.401 DE 2015 – Locais insalubres – PAG 06.pdf","texto":"ANO CIX N  229 SÃO LUÍS, SEXTA-FEIRA, 11 DE DEZEMBRO DE 2015   EDIÇÃO DE HOJE: 36 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo .......................................................................... 01 Casa Civil ..................................................................................... 10 Tribunal de Contas do Estado do Maranhão ............................ 17 Secretaria de Estado do Planejamento e Orçamento ............. 21 Secretaria de Estado da Gestão e Previdência ......................... 21 Secretaria de Estado da Fazenda ............................................... 27 Secretaria de Estado da Saúde .................................................. 29 Secretaria de Estado da Agricultura e Pecuária ...................... 31 Secretaria de Estado da Agricultura Familiar ......................... 32 Secretaria de Estado da Educação ............................................. 32 Secretaria de Estado da Cultura ............................................... 32 Secretaria de Estado de Administração Penitenciária ............ 33 Secretaria de Estado dos Direitos Humanos e Participação Popular 33 Assembleia Legislativa do Estado do Maranhão ...................... 33 PODER EXECUTIVO LEI N  10.370, DE 11 DE DEZEMBRO DE 2015.  Considera de utilidade pública o Clu- be de Mães da Escola Comunitária Canaã - CEMECC.  O GOVERNADOR DO ESTADO DO MARANHÃO,  Faço saber a todos os seus habitantes que a Assembleia Legislativa do Estado decretou e eu sanciono a seguinte Lei:  Art. 1    É considerado de utilidade pública o Clube de Mães da Escola Comunitária Canaã - CEMECC, com sede e foro no Município de São Luís, Estado do Maranhão.  Art. 2    Esta Lei entra em vigor na data de sua publicação. Mando, portanto, a todas as autoridades a quem o conhecimen- to e a execução da presente Lei pertencerem que a cumpram e a façam cumprir tão inteiramente como nela se contém. O Excelentíssimo Senhor Secretário-Chefe da Casa Civil a faça publicar, imprimir e correr. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 11 DE DEZEMBRO DE 2015, 194  DA INDEPEN- DÊNCIA E 127  DA REPÚBLICA. FLÁVIO DINO Governador do Estado do Maranhão MARCELO TAVARES SILVA Secretário de Estado da Casa Civil  LEI N  10.371, DE 11 DE DEZEMBRO DE 2015.  Considera de utilidade pública a Igreja Apostólica da Palavra de Deus - IAPD.  O GOVERNADOR DO ESTADO DO MARANHÃO,  Faço saber a todos os seus habitantes que a Assembleia Legislativa do Estado decretou e eu sanciono a seguinte Lei:  Art. 1    Fica considerada de utilidade pública a Igreja Apostó- lica da Palavra de Deus - IAPD, com sede e foro no Município de São Luís, Estado do Maranhão, que tem como objetivo a propagação do Evangelho de Nosso Senhor Jesus Cristo, bem como a Fundação e Manutenção de Igrejas e Congregações, dentro e fora do país, sob o regime de filiais, com a mesma finalidade a qual se propõe a Igreja Sede.  Art. 2    Esta Lei entra em vigor na data de sua publicação"},{"titulo":"Decreto n 31.593/2016 - Redefinicao das Circunscricoes","tipo":"Decreto","tema":"Estrutura Organizacional","ano":2016,"arquivo":"DECRETO Nº 31.593 DE 2016 – Redefinição das Circunscrições – PAG 01 a 08.pdf","texto":"ANO CX N  062 SÃO LUÍS, TERÇA-FEIRA, 05 DE ABRIL DE 2016   EDIÇÃO DE HOJE: 32 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 08 Comissão Central Permanente de Licitação ........................... 14 Secretaria de Estado do Planejamento e Orçamento ............. 16 Secretaria de Estado da Gestão e Previdência ......................... 18 Secretaria de Estado da Fazenda ............................................... 21 Secretaria de Estado da Saúde .................................................. 23 Secretaria de Estado das Cidades e Desenvolvimento Urbano ....... 23 Secretaria de Estado de Transparência e Controle ................. 24 Secretaria de Estado da Ciência, Tecnologia e Inovação ............... 24 Secretaria de Estado da Agricultura, Pecuária e Pesca .......... 29 Secretaria de Estado da Educação ............................................. 31 Secretaria de Estado do Desenvolvimento Social ................... 31 Secretaria de Estado dos Direitos Humanos e Participação Popular ... 31 Secretaria de Estado da Mulher ................................................ 32 PODER EXECUTIVO DECRETO N  31.592, DE 4 DE ABRIL DE 2016.  Transforma   cargos   da   estrutura   da   Secretaria de   Estado   da   Saúde   e   dá   outras   providências.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso das atribuições que lhe conferem os incisos III e V do art. 64 da Constituição Estadual,  DECRETA :  Art. 1    Ficam transformados da estrutura da Secretaria de Estado da Saúde 1 (um) cargo de Supervisor, Simbologia DANS-3, 1 (um) cargo de Assessor Especial, Simbologia DGA e 1 (um) cargo de Auxiliar Técnico I, Simbologia DAI-4, em 1 (um) cargo de Assessor Especial de Apoio Institucional, Simbologia ISOLADO.  Art. 2    Ficam transformados da estrutura da Secretaria de Estado da Saúde 2 (dois) cargos de Assessor Especial II, Simbologia DANS-2 e 2 (dois) cargos de Assessor Especial, Simbologia DGA, em 2 (dois) cargos de Assessor Especial de Apoio Institucional, Simbologia ISOLADO.  Art. 3    Fica alterada da estrutura da Secretaria de Estado da Saúde a nomenclatura de 1 (um) cargo de Chefe de Departamento de Manutenção e Estrutura Física, Simbologia DAS-1, em 1 (um) cargo de Assessor Sênior, Simbologia DAS-1.  Art. 4    Este Decreto entra em vigor na data da sua publicação. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 4 DE ABRIL DE 2016, 195  DA INDEPENDÊNCIA E 128  DA REPÚBLICA. FLÁVIO DINO Governador do Estado do Maranhão MARCELO TAVARES SILVA Secretário-Chefe da Casa Civil  DECRETO N  31.593, DE 5 DE ABRIL DE 2016.  Dispõe sobre a redefinição de Áreas Integradas de Segurança Pública e cir- cunscrições integradas para os Municípios da Ilha de São Luís.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso das atribuições que lhe conferem os incis"},{"titulo":"Decreto n 31.797/2016 - Padronizacao de Dados Estatisticos","tipo":"Decreto","tema":"Administracao","ano":2016,"arquivo":"DECRETO Nº 31.797 DE 2016. – padroniza a apuração de dados estatísticos. pag. 05 a 06.pdf","texto":"ANO CX N  097 SÃO LUÍS,QUARTA-FEIRA, 25 DE MAIO DE 2016   EDIÇÃO DE HOJE: 44 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 12 Secretaria de Estado do Planejamento e Orçamento ............. 22 Secretaria de Estado da Gestão e Previdência ......................... 22 Secretaria de Estado da Fazenda ........................................... 26 Secretaria de Estado da Saúde .................................................. 27 Secretaria de Estado de Indústria e Comércio ........................ 31 Secretaria de Estado do Meio Ambiente e Recursos Naturais ... 31 Secretaria de Estado da Agricultura Familiar ......................... 32 Secretaria de Estado da Cultura e Turismo ............................. 32 Secretaria de Estado de Segurança Pública ............................. 33 Secretaria de Estado dos Direitos Humanos e Participação Popular ... 38 Secretaria de Estado de Administração Penitenciária ............ 39 Assembleia Legislativa do Estado do Maranhão ...................... 43 Esta edição publica em Suplemento, a Portaria n  038 de 23 de maio de 2016; referente ao Relatório Resumido da Execu- ção Orçamentária do 2  Bimestre e o Relatório de Gestão Fis- cal do 1  Quadrimestre de 2016. PODER EXECUTIVO LEI COMPLEMENTAR N  182, DE 20 DE MAIO DE 2016.  Dispõe sobre a criação de novas serventias extrajudiciais de registro imobiliário do Município de São Luís e altera a competência das Serventias do 1  e 2  Ofícios dos municípios onde existam duas serventias extrajudiciais e dá outras providências.  O GOVERNADOR DO ESTADO DO MARANHÃO,  Faço saber a todos os seus habitantes que a Assembleia Legislativa do Estado decretou e eu sanciono a seguinte Lei Complementar:  Art. 1    O inciso III e   2 , do art. 187 da Lei Complementar n  14, de 17 de dezembro de 1991 (Código de Divisão e Organiza- ção Judiciárias do Estado do Maranhão), passarão a vigorar com a seguinte redação:  Art. 187. No Município de São Luís existirão: (...) III - quatro serventias extrajudiciais do Registro de Imóveis denominadas de 1 , 2 , 3  e 4  Zonas do Registro de Imóveis;   2  O Registro Imobiliário será dividido em quatro zonas: I - a Primeira Zona compreenderá toda a área esquerda da linha que, partindo da antiga Rampa Campos Melo segue as ruas Portugal, Cândido Mendes, João Vital de Matos, Rua Grande, Avenida Getúlio Vargas até seu encontro com a Avenida dos Franceses, seguindo por esta via até seu encontro com a Avenida Daniel de La Touche, na rota- tória do Elevado Alcione Nazaré, prosseguindo na Avenida Daniel de La Touche, até o encontro desta com a Avenida Jerônimo de Albuquerque, seguindo nesta via, no sentido da Curva do Noventa até a confluência com a Avenida Carlos Cunha, no sentido da rotatória do Calhau, pros- seguindo até o encontro com a Avenid"},{"titulo":"Decreto n 32.201/2016 - Designacao de Policiais Aposentados","tipo":"Decreto","tema":"Gestao de Pessoal","ano":2016,"arquivo":"DECRETO Nº 32.201 DE 2016 – designação de policiais civis aposentados. pag. 11 a 12.pdf","texto":"ANO CX N  177 SÃO LUÍS, QUINTA-FEIRA, 22 DE SETEMBRO DE 2016   EDIÇÃO DE HOJE: 60 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ............................................................................ 01 Procuradoria Geral do Estado ..................................................... 17 Secretaria de Estado da Gestão e Previdência .......................... 18 Secretaria de Estado da Fazenda ................................................ 22 Secretaria de Estado da Saúde ................................................... 27 Secretaria de Estado da Ciência,Tecnologia e Inovação .......... 29 Secretaria de Estado da Agricultura Familiar .......................... 35 Secretaria de Estado da Agricultura, Pecuária e Pesca ......... 36 Secretaria de Estado da Educação ............................................. 37 Secretaria de Estado da Segurança Pública ............................. 38 Secretaria de Estado dos Direitos Humanos e Participação Popular .... 58 Secretaria de Estado de Administração Penitenciária ............. 59 Esta Edição publica em Suplemento; os Atos de Apo- sentadoria da Secretaria de Estado da Gestão e Previdência. PODER EXECUTIVO DECRETO N  32.196, DE 21 DE SETEMBRO DE 2016  Institui tratamento tributário simplifi- cado e diferenciado ao agricultor fami- liar e suas organizações.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso de suas atribuições que lhe conferem os incisos III e V do art. 64 da Constituição Estadual,  DECRETA  Art. 1  Fica assegurado tratamento tributário simplifica- do e diferenciado ao agricultor familiar e suas organizações no âmbito do Imposto sobre Operações relativas à Circulação de Mercadorias e sobre Prestação de Serviço de Transporte Inte- restadual e Intermunicipal e de Comunicação - ICMS, com o objetivo de desenvolver e dar sustentabilidade ao setor, promovendo o crescimento da economia familiar. Art.2  Para os efeitos deste Decreto consideram-se as seguintes definições: I - Agricultor Familiar: é a pessoa física que se dedica à ativida- de agropecuária, e que processa alimentos como forma de agregação de valor à sua produção, em consonância com os requisitos do Programa Nacional de Agricultura Familiar - PRONAF; II - Associação de Produtores Artesanais de Alimentos ou de Agricultores Familiares: é a organização, sem fins lucrativos e com personalidade jurídica própria, com o objetivo de apoiar os produtores artesanais de alimentos ou agricultores familiares; III - Cooperativa de Produtores Artesanais de Alimentos ou de Agricultores Familiares: é a sociedade civil com fins associativos, com personalidade jurídica própria, constituída para prestar serviços aos seus cooperados. Art. 3  Os beneficiários dispostos nos incisos do artigo 2  deste Decreto deverão atender aos seguintes requisitos: I - enquadrar-se no conceito de  produtor familiar , nos termos da Lei Federal n  11.326, de 24 de julho de 2006; II - ter faturamento anual proveniente da produção ag"},{"titulo":"Decreto n 33.871/2018 - Competencia DEM","tipo":"Decreto","tema":"Estrutura Organizacional","ano":2018,"arquivo":"DECRETO Nº 33.871 DE 2018 – competência DEM – PAG 1.pdf","texto":"ANO CXII N  046 SÃO LUÍS, SEXTA-FEIRA, 09 DE MARÇO DE 2018   EDIÇÃO DE HOJE: 16 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 03 Secretaria de Estado da Gestão, Patrimônio e Assistência dos Servidores ............................................................................. 04 Secretaria de Estado da Fazenda ............................................... 05 Secretaria de Estado da Saúde .................................................. 06 Secretaria de Estado de Indústria, Comércio e Energia ............ 08 Secretaria de Estado da Agricultura, Pecuária e Pesca ............ 08 Secretaria de Estado da Educação ............................................. 09 Secretaria de Estado da Segurança Pública ............................. 11 Secretaria de Estado do Esporte e Lazer .................................. 14 Assembleia Legislativa do Estado do Maranhão ...................... 14 Esta edição publica em Suplemento; as Portarias da Secretaria de Estado da Educação. PODER EXECUTIVO DECRETO N  33.871, DE 9 DE MARÇO DE 2018.  Define as competências da Delegacia Especial de Atendimento à Mulher de São Luís - DEM SÃO LUÍS, e dá outras providências. O   GOVERNADOR DO ESTADO DO MARANHÃO , no uso da atribuição que lhe confere o parágrafo único do art. 64 da Constituição Estadual,  DECRETA Art. 1    A Delegacia Especial da Mulher de São Luís - DEM SÃO LUÍS, diretamente subordinada à Superintendência de Polícia Civil da Capital, com circunscrição no município de São Luís, compete apurar os seguintes crimes: I - os previstos no Título I, Capítulos II, III, V e VI do Código Penal Brasileiro, cujas vítimas sejam mulheres com idade entre 18 e 59 anos, em situação de violência doméstica e familiar, conforme determi- nado pela Lei n  11.340/2006, respeitadas as atribuições das outras Delegacias Especializadas; II - os previstos no Título VI, Capítulos I, II, V e VI, da Parte Especial do Código Penal Brasileiro, cujas vítimas sejam mulheres com idade entre 18 e 59 anos, respeitadas as atribuições das outras Delegacias Especializadas. Parágrafo único. Excetuam-se do disposto no inciso I os crimes previstos nos artigos 134 (exposição ou abandono de recém-nascido) e 135-A (condicionamento de atendimento médico-hospitalar emergencial) do Código Penal Brasileiro.  Art. 2    Compete, ainda, à DEM-São Luís desenvolver ações que objetivem a preservação dos direitos das mulheres, com idade entre 18 e 59 anos, prestando-lhes acompanhamento psicossocial, conforme Lei n  10.238/2015, por intermédio da: I - seção de Investigação Criminal; II - seção de Apoio administrativo; III - seção de Cartório; IV - seção de Psicologia; V - seção de Serviço Social.  Art. 3    Além das disposições legais vigentes, é garantido à mu- lher, em situação de violência doméstica e f"},{"titulo":"IN 01/2002 - Normatiza Plantao Central","tipo":"Instrucao Normativa","tema":"Plantoes e Escalas","ano":2002,"arquivo":"IN 01 2002 Normatiza Plantão Central – Pag 11 a 19.pdf","texto":"D.O. PODER EXECUTIVO   TERÇA-FEIRA, 31-DEZEMBRO-2002   1 SUPLEMENTO  123456789 e Polícia, Investigador de Polícia, Escrivão de Polí- cia, Perito Criminalístico Auxiliar, Agente Penitenciário, Inspetor Penitenciário e Analista Penitenciário, e dá outras provi- dências. A GOVERNADORA DO ESTADO DO MARANHÃO, no uso da atribuição que lhe confere o   1  do art. 42 da Constituição Estadual, adota a seguinte Medida Provisória, com força de Lei: Art. 1  Os subsídios dos servidores ocupantes dos cargos de Comissário de Polícia, Investigador de Polícia, Escrivão de Polícia, Perito Criminalístico Auxiliar, Agente Penitenciário, Inspetor Peniten- ciário e Analista Penitenciário, pertencentes aos Grupos Ocupacionais Atividades Policia Civil   APC e Atividades Penitenciárias   AP, são os fixados nos Anexos I a II, desta Medida Provisória. Art. 2  As despesas resultantes da aplicação desta Medida Provisória correrão à conta das dotações orçamentárias próprias. Art. 3  Esta Medida Provisória entra em vigor na data da sua publicação com efeitos financeiros a considerar de 1  de agosto de 2009. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 06 DE OUTUBRO DE 2009, 188  DA INDEPEN- DÊNCIA E 121  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão JOÃO GUILHERME DE ABREU Secretário-Chefe da Casa Civil LUCIANO FERNANDES MOREIRA Secretário de Estado da Administração e Previdência Social RAIMUNDO SOARES CUTRIM Secretário de Estado da Segurança Pública  ANEXO I  TABELA DE SUBSÍDIO DO SERVIDOR DO GRUPO APC VALOR DO SUBSÍDIO - R$ N Í V E I S ESPECIFICAÇÃO   CLASSE I   II   III   IV   V 3    2.245,94   2.268,40   2.291,08   2.313,99   2.337,14 2    2.430,62   2.454,93   2.479,48   2.504,27   2.529,31 1    2.630,49   2.656,79   2.683,35   2.710,19   2.737,30 COMISSÁRIO DE POLÍCIA ESPECIAL   2.846,78   2.875,25   2.904,00   2.933,04   2.962,38 QUARTA-FEIRA, 07 - OUTUBRO - 2009   D. O. POD"},{"titulo":"IN 01/2010 - Exames Periciais","tipo":"Instrucao Normativa","tema":"Pericia e Forense","ano":2010,"arquivo":"IN 01 2010 EXAMES PERICIAIS pgs 34 e 35.pdf","t  DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 10 DE FEVEREIRO DE 2010, 189  DA INDEPEN- DÊNCIA E 122  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão JOÃO GUILHERME DE ABREU Secretário-Chefe da Casa Civil CLÁUDIO JOSÉ TRINCHÃO SANTOS Secretário de Estado da Fazenda  DECRETO N  26.278 DE 10 DE FEVEREIRO DE 2010  Concede às distribuidoras de energia elétrica diferimento do lançamento e do pagamento do ICMS, na condição que especifica. A GOVERNADORA DO ESTADO DO MARANHÃO, no uso das atribuições que lhe confere o art. 64, inciso III da Constituição do Estado, DECRETA: Art. 1  Ficam diferidos o lançamento e o pagamento do im- posto sobre operações relativas à circulação de mercadorias e sobre prestações de serviços de transporte interestadual e intermunicipal e de comunicação - ICMS, devido por consumo irregular de energia elé- trica, vinculado a acordo de parcelamento firmado entre as distribuido- ras e o consumidor.   1  O imposto diferido a que se refere o caput deste artigo será lançado "},{"titulo":"IN 01/2011 - Mandado de Prisao por Pensao Alimenticia","tipo":"Instrucao Normativa","tema":"Investigacao Criminal","ano":2011,"arquivo":"IN 01 2011 MANDADO DE PRISÃO POR PENSÃO ALIMENTÍCIA – Pag 09.pdf","texto":""},{"titulo":"IN 03/2011 - Registro de Ocorrencia","tipo":"Instrucao Normativa","tema":"Investigacao Criminal","ano":2011,"arquivo":"IN 03 2011 REGISTRO DE OCORRENCIA pgs 23 e 24.pdf","texto":"ANO CV N  125 SÃO LUÍS, QUINTA-FEIRA, 30 DE JUNHO DE 2011 EDIÇÃO DE HOJE: 24 PÁGINAS  SUMÁRIO Poder Executivo .......................................................................... 01 Secretaria de Estado do Planejamento, Orçamento e Gestão ...... 11 Comissão Central Permanente de Licitação ........................... 12 Secretaria de Estado da Fazenda ............................................... 12 Secretaria de Estado da Ciência, Tecnologia e Ensino Superior .... 17 Secretaria de Estado da Educação ............................................. 19 Secretaria d NHÃO,  Faço saber a todos os seus habitantes que a Assembleia Legislativa do Estado decretou e eu sanciono a seguinte Lei:  Art. 1   Fica considerado de utilidade pública o Instituto Guará, com sede e foro no Município de São Luís-MA.  Art. 2    Esta Lei entra em vigor na data de sua publicação. Mando, portanto, a todas as autoridades a quem o conhecimen- to e a execução da presente Lei pertencerem que a cumpram e a façam cumprir tão inteiramente como nela se contém. O Excelentíssimo Senhor Secretário-Chefe da Casa Civil a faça publicar, imprimir e correr. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 28 DE NOVEMBRO DE 2012, 191  DA INDEPEN- DÊNCIA E 124  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão LUIS FERNANDO MOURA DA SILVA Secretário-Chefe da Casa Civil  CASA CIVIL  A GOVERNADORA DO ESTADO DO MARANHÃO, no uso de suas atribuições legais, RESOLVE: Exonerar PEDRO FERNANDES RIBEIRO, representante da Secretaria de Estado das Cidades e Desenvolvimento Urbano, junto ao Conselho Estadual das Cidades e Conselho Gestor do Fundo Estadual de Habitação de Interesse Social, como membro-titular. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 28 DE NOVEMBRO DE 2012, 191  DA INDEPEN- DÊNCIA E 124  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão LUIS FERNANDO MOURA DA SILVA Secretário-Chefe da Casa Civil A GOVERNADORA DO ESTADO DO MARANHÃO, no uso de suas atribuições legais, RESOLVE: Nomear HILDO AUGUSTO DA ROCHA NETO para o Conselho Estadual das Cidades e Conselho Gestor do Fundo Esta- dual de Habitação de Interesse Social, na qualidade de representante da Secretaria de Estado das Cidades e Desenvolvimento Urbano, como membro-titular. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 28 DE NOVEMBRO DE 2012, 191  DA INDEPEN- DÊNCIA E 124  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão LUIS FERNANDO MOURA DA SILVA Secretário-Chefe da Casa Civil  SECRETARIA DE ESTADO DA GESTÃO E PREVIDÊNCIA  A SECRETÁRIA ADJUNTA DE SEGURIDADE DOS SER- VIDORES PÚBLICOS ESTA"},{"titulo":"IN 08/2012 - Investigacao de Homicidio","tipo":"Instrucao Normativa","tema":"Investigacao Criminal","ano":2012,"arquivo":"IN 08 2012 INVESTIGAÇÃO DE HOMICIDIO PGS 40 a 42.pdf","texto":"ANO CVI N  248 SÃO LUÍS, SEGUNDA-FEIRA, 24 DE DEZEMBRO DE 2012 EDIÇÃO DE HOJE: 48 PÁGINAS  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 05 Secretaria de Estado do Planejamento e Orçamento ............... 09 Secretaria de Estado da Gestão e Previdência ......................... 09 Secretaria de Estado da Infraestrutura .................................... 12 Secretaria de Estado da Saúde .................................................. 14 Secretaria de Estado da Educação ............................................. 36 Secretaria de Estado da Segurança Pública ............................. 36 Assembleia Legislativa do Estado do Maranhão ...................... 42  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  PODER EXECUTIVO DECRETO N  28.799, DE 24 DE DEZEMBRO DE 2012.  Abre ao Orçamento do Estado, em favor do Fundo Estadual de Pensão e Aposen- tadoria, crédito suplementar no valor de R$ 5.000.000,00 (cinco milhões de reais), para reforço de dotação constante da Lei Orçamentária vigente.  A GOVERNADORA DO ESTADO DO MARANHÃO , no uso de suas atribuições legais e tendo em vista a autorização contida no art. 43,   1 , inciso III da Lei Federal n  4.320 de 17.03.64, no inciso III do art. 5  e no inciso V do art. 6  da Lei Estadual n  9.554 de 16.01.2012 e alínea  c  do art. 7  do Decreto n  28.692 de 16.11.2012,  DECRETA: Art. 1    Fica aberto ao Orçamento do Estado, em favor do Fundo Estadual de Pensão e Aposentadoria, crédito suplementar no valor de R$ 5.000.000,00 (cinco milhões de reais), para atender à programação constante do Anexo II.  Art. 2    Os recursos necessários à abertura do crédito de que trata o art. 1  decorrem de anulação parcial de dotação Orçamentária no valor de R$ 5.000.000,00 (cinco milhões de reais), conforme indicado no Anexo I.  Art. 3    Este Decreto entra em vigor na data de sua publicação. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 24 DE DEZEMBRO DE 2012, 191  DA INDEPEN- DÊNCIA E 124  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão LUIS FERNANDO MOURA DA SILVA Secretário-Chefe da Casa Civil JOÃO BERNARDO DE AZEVEDO BRINGEL Secretário de Estado do Planejamento e Orçamento CLÁUDIO JOSÉ TRINCHÃO SANTOS Secretário de Estado da Fazenda FÁBIO GONDIM PEREIRA DA COSTA Secretário de Estado da Gestão e Previdência  QUADRO DE DETALHAMENTO DA DESPESA   ANEXO I   CAN CELAMENTO  RECURSOS D E TODAS AS FO NTES 5800 0   SECRETARIA DE ES TADO DA GESTÃO E PREV IDÊNCIA 5820 2   FUNDO ES TAD UA L DE PENSÃO E A POSENTAD ORIA VALOR R$ CÓ DIGO   ESPECIFICAÇÃO E S F E R A RP   NATUREZA D A DESPESA I D U S O F O N T E DETALHADO   TO TA L 582 02.0 927204 200.909 000 1 Provento s de Aposentadoria do Poder Executivo No Estado do Maranhão   S   1   3.1.90.0 0   0   101   5.000.000,00   5.000.000,00  RECURSOS DO TESOURO- ORDINÁ RIOS R ECURSOS DO TESOURO- VIN CUL"},{"titulo":"IN 03/2013 - Atribuicoes da DRF","tipo":"Instrucao Normativa","tema":"Estrutura Organizacional","ano":2013,"arquivo":"IN 03 2013 ATRIBUIÇÕES DA DRF PGS 14 a 15.pdf","texto":"ANO CVII N  129 SÃO LUÍS, SEXTA-FEIRA, 05 DE JULHO DE 2013 EDIÇÃO DE HOJE: 18 PÁGINAS  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 01 Controladoria Geral do Estado .................................................. 04 Secretaria de Estado da Gestão e Previdência ......................... 05 Secretaria de Estado da Saúde .................................................. 11 Secretaria de Estado da Agricultura, Pecuária e Abastecimento .... 13 Secretaria de Estado da Educação ............................................. 13 Secretaria de Estado da Segurança Pública ............................. 13 Secretaria de Estado da Justiça e da Administração Penitenciária .... 17  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  PODER EXECUTIVO MEDIDA PROVISÓRIA N  148, DE 4 DE JULHO DE 2013  Autoriza o Poder Executivo a conce- der compensação financeira, a título de subvenção econômica, no preço do litro de leite de vaca pago a produtores e laticínios, no âmbito do Programa Leite é Vida, e dá outras providências.  A GOVERNADORA DO ESTADO DO MARANHÃO , no uso das atribuições que lhe confere o   1  do art. 42 da Constituição Estadual, adota a seguinte Medida Provisória, com força de lei:  Art. 1    Fica o Poder Executivo autorizado a conceder com- pensação financeira, a título de subvenção econômica, no preço do litro de leite de vaca paga aos produtores e laticínios, no âmbito do Programa Leite é Vida, visando fortalecer a produção do pequeno agricultor familiar e implementar os mecanismos de segurança alimen- tar e nutricional, equilibrar o elevado custo de produção do leite de vaca beneficiado e integrar os segmentos da cadeia produtiva do leite.  Art. 2    O valor da subvenção econômica será calculado consi- derando-se a diferença entre o valor do litro de leite de vaca fixado no exercício de 2013 em R$ 0,95 (noventa e cinco centavos) para o pro- dutor e R$ 0,65 (sessenta e cinco centavos) para o laticínio e os respectivos valores fixados para ambos no âmbito do Programa de Aquisição de Alimentos - PAA. Parágrafo único. O Poder Executivo, por ato próprio, po- derá fixar anualmente o valor do litro leite de vaca a ser praticado como parâmetro para a definição do cálculo da subvenção econômica concedida por esta Medida Provisória.  Art. 3    Os recursos necessários para atender às despesas com o pagamento da subvenção econômica prevista nesta Medida Provi- sória serão oriundos do Fundo Maranhense de Combate à Pobreza - FUMACOP e serão consignados anualmente na ação orçamentária 2487 - Distribuição de Leite Com Condicionalidade - Leite é Vida da programação da Secretaria de Estado da Saúde.  Art. 4    Esta Medida Provisória entra em vigor na data de sua publicação. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 4 DE JULHO DE 2013, 192  DA INDEPENDÊN- CIA E 125  DA REPÚBLICA. ROSEANA SARNEY Go"},{"titulo":"IN 02/2014 - Atribuicoes da Defraudacoes","tipo":"Instrucao Normativa","tema":"Estrutura Organizacional","ano":2014,"arquivo":"IN 02 2014 ATRIBUIÇÕES DA DEFRAUDAÇÕES PGS 21.pdf","texto":"SUMÁRIO Casa Civil ..................................................................................... 01 Comissão Central Permanente de Licitação ........................... 01 Secretaria de Estado da Gestão e Previdência ................................ 02 Secretaria de Estado da Fazenda ............................................... 04 Secretaria de Estado do Desenvolvimento, Indústria e Comércio ....... 05 Secretaria de Estado Ciência, Tecnologia e Ensino Superior ......... 08 Secretaria de Estado da Agricultura, Pecuária e Abastecimento ..... 08 Secretaria de Estado da Educação ............................................. 09 Secretaria de Estado dos Direitos Humanos, Assistência Social e Cidadania .................................................................................. 10 Secretaria de Estado da Segurança Pública ............................. 10  ANO CVIII N  084 SÃO LUÍS, SEGUNDA-FEIRA, 05 DE MAIO DE 2014 EDIÇÃO DE HOJE: 24 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  CASA CIVIL  A GOVERNADORA DO ESTADO DO MARANHÃO, no uso de suas atribuições legais, RESOLVE: Nomear MÁRCIO AUGUSTO VASCONCELOS COUTINHO para o cargo de Secretário de Estado de Assuntos Políticos. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 5 DE MAIO DE 2014, 193  DA INDEPENDÊNCIA E 126  DA REPÚBLICA. ROSEANA SARNEY Governadora do Estado do Maranhão ANNA GRAZIELLA SANTANA NEIVA COSTA Secretária-Chefe da Casa Civil  COMISSÃO CENTRAL PERMANENTE DE LICITAÇÃO PORTARIA N  023/2014, DE 29 DE ABRIL DE 2014  O PRESIDENTE DA COMISSÃO CENTRAL PERMANEN- TE DE LICITAÇAO - CCL, no uso de suas atribuições legais, Considerando o dispositivo normativo expresso pelo art. 74, inciso III, da Lei Estadual n  9.579/2012, o qual estabelece o dever-poder de a Administração Pública fiscalizar a execução dos contratos administrativos; Considerando o que dispõe o art. 85, da Lei Estadual n . 9.579/2012, que determina que todo contrato deve ser acompanhado por um gestor de contrato, representante da Administração Pública, especialmente designado; RESOLVE: Art. 1  Designar o servidor CARLOS HENRIQUE DUARTE PAIVA GOMES, matrícula n  2252294, assessor sênior, para promover o acompanhamento e a fiscalização da execução do contrato administra- tivo n  01/2014/PO/CCL, celebrado entre a Comissão Central Perma- nente de Licitação - CCL e a empresa Technocopy Equipamentos Su- primentos e Serviços Ltda., que tem por objeto a prestação de serviços continuados de locação de 07 (sete) equipamentos multifuncionais laser monocromáticos e coloridos, com funções de impressão, cópia, digitalização e fax modelo em linha de fabricação, com franquia men- sal de 22.000 (vinte e duas mil) páginas/mês, incluindo instalação, treinamento dos servidores, assistência técnica e manutenção pre- ventiva e corretiva, além do fornecimento de todos os suprimentos (toner, revelador, cilindros, etc.), peças e componentes necessárias ao perfeito funcionamento dos equipamentos, exceto papel, confor"},{"titulo":"IN 03/2014 - Encaminhamento de Arma das Forcas Policiais","tipo":"Instrucao Normativa","tema":"Armamento","ano":2014,"arquivo":"IN 03 2014 ENCAMINHAMENTO DE ARMA DAS FORÇAS POLICIAIS PGS 71.pdf","texto":"SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................  2014.  Dispõe sobre a transformação de Compa- nhias Independentes em Batalhões da Polícia Militar e dá outras providências.  A GOVERNADORA DO ESTADO DO MARANHÃO,  Faço saber a todos os seus habitantes que a Assembleia Legislativa do Estado decretou e eu sanciono a seguinte Lei:  Art. 1    Ficam transformadas na estrutura da Polícia Militar as seguintes Organizações Policiais Militares - OPM: I - a 4  Companhia de Polícia Militar Independente - 4  CI, com sede no Município de Chapadinha, em 16  Batalhão de Polícia Militar - 16  BPM, com a seguinte circunscrição: Água Doce do Maranhão, Anapurus, Araioses, Belágua, Brejo, Buriti, Magalhães de Almeida, Mata Roma, Milagres do Maranhão, Paulino Neves, Santa Quitéria do Maranhão, Santana do Maranhão, São Benedito do Rio Preto, São Bernardo, Tutóia e Urbano Santos; II - a 9  Companhia de Polícia Militar Independente - 9  CI, com sede no Município de Codó, em 17  Batalhão de Polícia Militar - 17  Batalhão de Polícia Militar - BPM, com a seguinte circunscrição: Coroatá, Peritoró e Timbiras; III - a 11  Companhia de Polícia Militar Independente - 11  CI, com sede no Município de Presidente Dutra, em 18  Batalhão de Polí- cia Militar - 18  BPM, com a seguinte circunscrição: Dom Pedro, Gon- çalves Dias, Governador Archer, Governador Eugênio Barros, Gover- nador Luiz Rocha, Graça Aranha, Joselândia, Santa Filomena do Maranhão, Santo Antônio dos Lopes, São Domingos do Maranhão, São José dos Basílios e Senador Alexandre Costa; IV - a 10  Companhia de Polícia Militar Independente - 10  CI, com sede no Município de Pedreiras, em 19  Batalhão de Polícia Mili- tar - 19  BPM, com a seguinte circunscrição: Pedreiras, Capinzal do Norte, Lima Campos, Trizidela do Vale, São Bernardo do Mearim, Igarapé Grande, Poção de Pedras, Esperantinópolis, São Roberto, São Raimundo do Doca Bezerra, Lago dos Rodrigues, Lago do Junco, Lago da Pedra e Lagoa Grande do Maranhão.  Art. 2    Os cargos e funções existentes no Quadro de Organiza- ção - QO das Unidades transformadas serão incorporados ao QO das novas Unidades.  "},{"titulo":"IN 004/2015 - SENARC","tipo":"Instrucao Normativa","tema":"Investigacao Criminal","ano":2015,"arquivo":"IN 004-2015 SENARC.pdf","texto":"ANO CIX N  209 SÃO LUÍS, QUINTA-FEIRA, 12 DE NOVEMBRO DE 2015   EDIÇÃO DE HOJE: 48 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 16 Secretaria de Estado do Planejamento e Orçamento ............. 17 Secretaria de Estado da Gestão e Previdência ......................... 17 Secretaria de Estado da Fazenda ............................................... 22 Secretaria de Estado de Indústria e Comércio ........................ 29 Secretaria de Estado da Agricultura Familiar ......................... 30 Secretaria de Estado da Agricultura e Pecuária ........................... 36 Secretaria de Estado da Ciência, Tecnologia e Inovação ........ 36 Secretaria de Estado da Educação ............................................. 37 Secretaria de Estado do Desenvolvimento Social ................... 43 Secretaria de Estado da Segurança Pública ............................. 43 Secretaria de Estado de Administração Penitenciária ............ 47 PODER EXECUTIVO DECRETO N  31.297, DE 12 DE NOVEMBRO DE 2015.  Abre ao Orçamento do Estado, em fa- vor da Secretaria de Estado do Plane- jamento e Orçamento, crédito suple- mentar no valor de R$ 280.000,00 (duzentos e oitenta mil reais), para reforço de dotações constantes da Lei Orçamentária vigente.  O GOVERNADOR DO ESTADO DO MARANHÃO,   no uso de suas atribuições legais e tendo em vista a autorização contida no inciso III,   1  do art. 43 da Lei Federal n  4.320 de 17.03.64 e no inciso III do art. 5  da Lei Estadual n  10.183 de 22.12.2014,  DECRETA: Art. 1 .   Fica aberto ao Orçamento do Estado, em favor da Se /2015 - Atribuicoes SHPP","tipo":"Instrucao Normativa","tema":"Estrutura Organizacional","ano":2015,"arquivo":"IN 06 2015 ATRIBUIÇÕES SHPP PGS 29 e 30.pdf","texto":"ANO CX N  009 SÃO LUÍS, QUINTA-FEIRA, 14 DE JANEIRO DE 2016   EDIÇÃO DE HOJE: 30 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 03 Secretaria de Estado da Gestão e Previdência ......................... 04 Secretaria de Estado da Fazenda ............................................... 12 Secretaria de Estado de Indústria e Comércio ........................ 15 Secretaria de Estado da Saúde .................................................. 18 Secretaria de Estado da Educação ............................................. 19 Secretaria de Estado da Segurança Pública ............................. 19 Secretaria de Estado de Administração Penitenciária ............ 30 Secretaria de Estado dos Direitos Humanos e Participação Popular 30 PODER EXECUTIVO DECRETO N  31.468, DE 30 DE DEZEMBRO DE 2015.  Homologa o Decreto n  028 de 10 de se- tembro de 2015, da Prefeitura Municipal de Chapadinha, que declarou situação anor- mal, caracterizada como SITUAÇÃO DE EMERGÊNCIA, às áreas afetadas por Estiagem - Cobrade 1.4.1.1.0.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso das atribuições legais conferidas pelo art. 64, incisos III e V da Constituição Estadual e pelo art. 7  da Lei Federal n  12.608, de 10 de abril de 2012, Considerando competir ao Estado à preservação do bem-estar da população, bem como das atividades socioeconômicas nas regiões atingidas por eventos adversos. Considerando o contido no Decreto do Município constante da ementa que declarou Situação de Emergência em virtude da ausência de precipitações pluviométricas, resultando no desastre caracterizado como Estiagem - Cobrade 1.4.1.1.0. Considerando, finalmente, a análi- se da documentação realizada pela Coordenadoria Estadual de Prote- ção e Defesa Civil, que atesta o correto preenchimento da documenta- ção necessária para demonstrar os danos e prejuízos causados pelo desastre, que implicaram no comprometimento parcial da capacidade de resposta do poder público do município,  DECRETA: Art. 1    Fica homologado o Decreto n  028 de 10 de setembro de 2015, da Prefeitura Municipal de Chapadinha, que declarou situa- ção anormal caracterizada como Situação de Emergência nas áreas descritas no Formulário de Informações de Desastres - FIDE.  Art. 2    Este Decreto entra em vigor na data de sua publicação. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 30 DE DEZEMBRO DE 2015, 194  DA INDEPEN- DÊNCIA E 127  DA REPÚBLICA. FLÁVIO DINO Governador do Estado do Maranhão MARCELO TAVARES SILVA Secretário-Chefe da Casa Civil  DECRETO N  31.469, DE 4 DE JANEIRO DE 2016.  Altera o nome das escolas da Rede Pública Estadual de Ensino.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso das atribuições que lhe conferem os incisos III e V do art. 64 da Constituição Estadual,  DECRETA Art. 1    Ficam alterados"},{"titulo":"IN 08/2017 - VPI","tipo":"Instrucao Normativa","tema":"Investigacao Criminal","ano":2017,"arquivo":"IN 08 2017 VPI PGS 95 a 97.pdf","texto":"ANO CXI N  170 SÃO LUÍS, QUARTA-FEIRA, 13 DE SETEMBRO DE 2017   EDIÇÃO DE HOJE: 98 PÁGINAS  ESTADO DO MARANHÃO  DIÁRIO OFICIAL  PODER   EXECUTIVO  SUMÁRIO Poder Executivo ........................................................................... 01 Casa Civil ..................................................................................... 24 Secretaria de Estado da Gestão e Previdência ......................... 30 Secretaria de Estado da Fazenda ............................................... 51 Secretaria de Estado da Saúde .................................................. 51 Secretaria de Estado de Indústria, Comércio e Energia ......... 61 Secretaria de Estado d  no âmbito da Secretaria de Estado de Governo - SEGOV.  O GOVERNADOR DO ESTADO DO MARANHÃO , no uso das atribuições que lhe conferem os incisos III e V do art. 64 da Consti- tuição Estadual e, de acordo com o disposto no art. 4  da Lei n  10.297, de 15 de agosto de 2015,  DECRETA Art. 1    Fica atribuída à Secretaria de Estado de Governo a com- petência para realizar, por meio da sua Comissão Setorial de Licitação, Pregão Presencial, cujo objeto é a contratação de empresa especializada na Administração e Gerenciamento de auxílio alimentação e/ou refeição na forma de cartões magnéticos, sendo um cartão destinado à aquisição de gêneros alimentícios, e outro destinado à aquisição de refeições, para os servidores da Secretaria de Estado de Governo do Maranhão - SEGOV/ MA e demais Órgãos Vinculados, com valor estimado em R$ 2.613.600,00 (dois milhões, seiscentos e treze mil e seiscentos reais).  Art. 2    Este Decreto entra em vigor na data de sua publicação. PALÁCIO DO GOVERNO DO ESTADO DO MARANHÃO, EM SÃO LUÍS, 18 DE JANEIRO DE 2018, 197  DA INDEPEN- DÊNCIA E 130  DA REPÚBLICA. FLÁVIO DINO Governador do Estado do Maranhão MARCELO TAVARES SILVA Secretário-Chefe da Casa Civil  Republicado por Incorreção. CASA CIVIL O SECRETÁRIO DE ESTADO CHEFE DA CASA CIVIL E O PRESIDENTE DA AGÊNCIA ESTADUAL DE MOBILIDA- DE URBANA E SERVIÇOS PÚBLICOS , no uso da competência delegada pelo Decreto n  30.719, de 9 de abril de 2015, e tendo em vista o Ofício n  037/2018-GAB/MOB, de 11 de janeiro de 20"},{"titulo":"IN 002/2018","tipo":"Instrucao Normativa","tema":"Administracao","ano":2018,"arquivo":"IN Nº 002-2018 DE 28 DE JUNHO DE 2018.pdf","texto":""},{"titulo":"IN 04/2021 - Uso do Certificado Digital","tipo":"Instrucao Normativa","tema":"Tecnologia da Informacao","ano":2021,"arquivo":"IN 04 2021 - uso do certificado digital.pdf","texto":"8  ESTADO   DO MARANHAO  SECRETARIA DE ESTADO DA SEGURANÇA PÚBLICA  POLICIACIVIL  DELEGACIAGERAL  INSTRUÇÃO NORBIATIVA   N  004/2021-DG/PCMA  Dispõe sobre o uso de certificado digital no  âmbito da PolíciaCivil do Maranhãoe dá  outrasprovidências  O DELEGADO   GERAL   DE POLICIA   CIVIL,   no uso de suas   atribuições legais, com base no art. 8  da Lei Estadual Do.8.508, de 27 de novembro de 2006, CONSIDERANDO   o disposto na Medida Provisória n  2.200-2, de 24 de agosto de 2001, que instituiu a Infraestmtura de Chaves   Públicas Brasileira (ICP-Brasil), para garantir a autenticidade, a integridade e a validade jurídica de documentos eletr6nicos; CONSIDERANDO   que o certificado digital equivale a documento formal de identidade no meio eletrânico e pode ser utilizado para realizar diversas operaçõesem ambiente   computacional; CONSIDERANDO   a   necessidadede disciplinar os procedimentos   inerentes ao   uso de certificado  digital   no âmbitoda Polícia Civil do Maranhão, anteos avanços tecnológicos inerentes à  formalização de inquéritos policiais por meio digital e remessadestesao Poder Judiciário pelo sistemade ProcessoJudicial Eletrõnico;  RESOLVE  Art.   I    A utilização de certificado digital no âmbito da Polícia Civil   do Maranhão obedecerá   ao disposto na legislação vigente e nesta   Instrução Normativa.  Art.   2  Para fins desta Instrução Normativa   considera-se:  1 -- documento eletrânico: aquele cujas informações são armazenadas originalmente em meio  eletrânico e assinado   digitalmente pelo autor das informações nele contidas;  11 --   documento   reproduzido   em   meio   eletrõnico:   aquele   cujas   informações,   armazenadas  originalmente   em papel ou em outro meio diverso do eletrõnico, são reproduzidasem meio  eletrõnico e assinado   digitalmente pelo autenticador das informações nele contidas;  111 --   certificados   digitais:   documentos   eletr6nicos   de   identidade   emitidos   por   autoridade  certificadora credenciada   pela Infraestrutura de Chaves Públicas Brasileira (ICP-Brasil), que  garantem a identificação do autor do documento eletr6nico ou do autenticados do documento  reproduzido   em meio eletr6nico; ESTADO   DO MARANHÃO  SECRETARIA DE ESTADO DA SEGURANÇA PÚBLICA  POLICIACIVIL  DELEGACIAGERAL  IV -- Infraestrutura de Chaves Públicas Brasileira (ICP-Brasil):   criada pela Medida Provisória n   2.200-2, de 24/08/2001 (mantida em vigor pelo art. 2    da Emenda Constitucional n    32, de  11/09/2001), caracteriza-sepor uma cadeia   hierárquica de autoridades   certificadoras, em cujo topo se encontra a autoridade certificadora raiz (AC Raiz); V -- autoridade certificadora: entidade subordinada à hierarquia da ICP-Brasil, responsável por emitir, distribuir, renovar, revogar e gerenciar certificados digitais, bem como por emitir listas de  certificados revogados (LCR) e manter registros de suas   operações, sempre obedecendo às   práticas  definidas na Declaração de Práticasde Certificação (DPC); VI -- as"},{"titulo":"Portaria 01/2010 - Uso de Viaturas","tipo":"Portaria","tema":"Administracao","ano":2010,"arquivo":"PORTARIA 01 2010 REGULAMENTA USO DE VIATURAS PGS 12.pdf","texto":"ANO CIV N  074 S O LUÕS, SEGUNDA-FEIRA, 19 DE ABRIL DE 2010 EDI  O DE HOJE: 16 P GINAS  SUMÁRIO Secretaria de Estado da Administração e Previdência Social ......... 01 Secretaria de Estado da Indústria e Comércio ....................... 02 Secretaria de Estado da Fazenda ............................................... 04 Secretaria de Estado do Desenvolvimento Social ................... 07 Secretaria de Estado do Turismo ............................................... 12 Secretaria de Estado da Segurança Pública ............................. 12 Secretaria de Estado dos Direitos Humanos e   Cidadania ..... 14 Secretaria de Estado do Trabalho e da Economia Solidária .. 14 Secretaria de Estado da Mulher ................................................ 14 Assembleia Legislativa do Estado do Maranhão ...................... 15  ESTADO DO MARANHÃO  DI RIO OFICIAL  PODER   EXECUTIVO  SECRETARIA DE ESTADO DA ADMINISTRAÇÃO E PREVIDÊNCIA SOCIAL  A SECRETÁRIA ADJUNTA DE G
