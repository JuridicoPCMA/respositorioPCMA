function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hlText(txt,q){
  if(!q)return esc(txt);
  var r="",j=0,tl=txt.toLowerCase(),ql=q.toLowerCase(),len=ql.length;
  while(j<txt.length){var k=tl.indexOf(ql,j);if(k<0){r+=esc(txt.slice(j));break;}r+=esc(txt.slice(j,k))+"<mark>"+esc(txt.slice(k,k+len))+"</mark>";j=k+len;}
  return r;
}
function trechoTexto(txt,q){
  if(!txt||!q)return "";
  var tl=txt.toLowerCase(),ql=q.toLowerCase();
  var i=tl.indexOf(ql);
  if(i<0)return "";
  var a=Math.max(0,i-80),b=Math.min(txt.length,i+q.length+80);
  var trecho=(a>0?"...":"")+txt.slice(a,b)+(b<txt.length?"...":"");
  return hlText(trecho,q);
}
function nomeArquivo(f){return decodeURIComponent(f);}
function getFiltrados(){
  var q=document.getElementById("busca").value.trim().toLowerCase();
  return DOCS.filter(function(d){
    if(filtro!=="Todos"&&d.tp!==filtro)return false;
    if(!q)return true;
    var txtDoc=textos[nomeArquivo(d.f)]||"";
    return d.t.toLowerCase().indexOf(q)>=0||d.tm.toLowerCase().indexOf(q)>=0||d.tp.toLowerCase().indexOf(q)>=0||String(d.a).indexOf(q)>=0||txtDoc.toLowerCase().indexOf(q)>=0;
  });
}
function card(d,q){
  var cor=COR[d.tp]||"#374151";
  var txtDoc=textos[nomeArquivo(d.f)]||"";
  var tr=trechoTexto(txtDoc,q);
  return '<div class="card" style="border-left-color:'+cor+'"><div class="ct"><span class="ctit">'+hlText(d.t,q)+'</span><div class="cm"><span class="badge" style="background:'+cor+'">'+esc(d.tp)+'</span><span class="ano">'+d.a+'</span></div></div>'+(tr?'<div class="trecho">'+tr+'</div>':"")+'<div class="cr"><a class="btn" href="'+BASE+d.f+'" target="_blank">&#128196; Abrir documento</a></div></div>';
}
function rFiltros(){
  document.getElementById("filtros").innerHTML=tipos.map(function(t){return'<button class="fb'+(filtro===t?" ativo":"")+'" onclick="setF(\''+t+'\')">'+esc(t)+"</button>";}).join("");
}
function setF(t){filtro=t;rFiltros();render();}
function setA(a){aba=a;document.getElementById("at").className="aba"+(a==="t"?" ativa":"");document.getElementById("ab").className="aba"+(a==="b"?" ativa":"");render();}
function onB(){var v=document.getElementById("busca").value.trim();if(v)setA("b");else setA("t");render();}
function render(){
  if(!textoCarregado){document.getElementById("conteudo").innerHTML='<p class="carregando">Carregando...</p>';return;}
  var q=document.getElementById("busca").value.trim();
  var ds=getFiltrados();
  var el=document.getElementById("conteudo");
  document.getElementById("ab").textContent="Resultado da Busca"+(q?" ("+ds.length+")":"");
  if(aba==="t"&&!q){
    var m={};ds.forEach(function(d){if(!m[d.tm])m[d.tm]=[];m[d.tm].push(d);});
    var temas=Object.keys(m);
    if(!temas.length){el.innerHTML='<p class="vazio">Nenhum documento.</p>';return;}
    el.innerHTML=temas.map(function(tm){return'<div class="secao"><button class="sh" onclick="tog(this)"><span>'+(ICO[tm]||"&#128196;")+'</span><span class="st">'+esc(tm)+'</span><span class="sc">'+m[tm].length+'</span><span class="stg">&#9650;</span></button><div class="sl"></div><div class="sd">'+m[tm].map(function(d){return card(d,"");}).join("")+"</div></div>";}).join("");
  }else{
    if(!ds.length){el.innerHTML='<p class="vazio">Nenhum resultado para "'+esc(q)+'".</p>';return;}
    el.innerHTML='<p class="ri">'+ds.length+' documento'+(ds.length>1?"s":"")+" encontrado"+(ds.length>1?"s":"")+" para \""+esc(q)+'"</p>'+ds.map(function(d){return card(d,q);}).join("");
  }
}
function tog(btn){var sd=btn.parentElement.querySelector(".sd");sd.classList.toggle("fechado");btn.querySelector(".stg").innerHTML=sd.classList.contains("fechado")?"&#9660;":"&#9650;";}
rFiltros();render();
</script>
</body>
</html>
